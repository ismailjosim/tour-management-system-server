			console.log(error)
		})

	console.log(uploadResult)



but we will do this by using another package:

our folder -> image -> form data -> file -> multer -> multer-storage-cloudinary -> req.file -> (npm install multer-storage-cloudinary) package(req.file obj) -> url -> mongoose -> mongodb


