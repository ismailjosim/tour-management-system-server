1. Required Packages:
  1) Multer: https://www.npmjs.com/package/multer
  2) type Declaration file for Multer: https://www.npmjs.com/package/@types/multer
  3) Cloudinary: https://console.cloudinary.com/app/c-955316328d8d722fc1b2a638b7a0e4/home/dashboard

Note: Here we handle file using Multer. but we need to store our files anywhere in the colud. So for that we will use Cloudinary

so first istall cloudinary: npm i cloudinary

then add this info into your Enviroment variables:
# cloudinary
CLOUDINARY_CLOUD_NAME=your_cloud_name
CLOUDINARY_API_KEY=api_key
CLOUDINARY_API_SECRET=api_secret

api link: CLOUDINARY_URL=cloudinary://<your_api_key>:<your_api_secret>@dggdr7ort

you can find all the info from Here: https://console.cloudinary.com/app/c-955316328d8d722fc1b2a638b7a0e4/settings/api-keys

frontend -> form data with image file -> multer will convert form data with -> form data -> so we will get this (body + File) from req

how multer send file + body in req
our folder -> image -> form data -> file -> multer -> multer own folder(temporary stored) in our project/pc -> req.file
multer -> form data -> file -> uploads folder -> req.File = image

when file file in req.file -> cloudinary(req.file) -> url -> mongoose -> mongodb


step: Configure Cloudinary
==========================

import { v2 as cloudinary } from 'cloudinary'
import { environmentVariables } from './env'

cloudinary.config({
	cloud_name: environmentVariables.CLOUDINARY.CLOUDINARY_CLOUD_NAME,
	api_key: environmentVariables.CLOUDINARY.CLOUDINARY_API_KEY,
	api_secret: environmentVariables.CLOUDINARY.CLOUDINARY_API_SECRET,
})

here we can use this option:
	const uploadResult = await cloudinary.uploader
		.upload(
			'https://res.cloudinary.com/demo/image/upload/getting-started/shoes.jpg',
			{
				public_id: 'shoes',
			},
